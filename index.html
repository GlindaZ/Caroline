<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caroline's Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- Decorative elements -->
  <div class="deco-circle deco-circle-1"></div>
  <div class="deco-circle deco-circle-2"></div>
  <div class="deco-circle deco-circle-3"></div>

  <div class="dots-layer" id="dotsLayer"></div>

  <!-- Main card -->
  <div class="card">
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-dot"></div>
      <div class="ornament-line right"></div>
    </div>

    <p class="welcome-label">your personal space</p>
    <h1 class="main-title">Welcome,<br><em>Caroline</em></h1>
    <p class="subtitle">a quiet corner, just for you</p>

    <div class="divider"></div>

    <div class="buttons">
      <a href="timer.html" class="btn">
        <div class="btn-left">
          <div class="btn-icon">🍅</div>
          <div class="btn-title">Tomato Timer</div>
          <div class="btn-desc">focus & rest in rhythm</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>

      <a href="planner.html" class="btn">
        <div class="btn-left">
          <div class="btn-icon">🗓</div>
          <div class="btn-title">Daily Planner</div>
          <div class="btn-desc">plan your days, gently</div>
        </div>
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <div class="footer">made with love ✦</div>
  </div>

  <script>
    // Generate soft scattered dots
    const layer = document.getElementById('dotsLayer');
    const sizes = [3, 4, 5, 6, 8];
    for (let i = 0; i < 28; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const size = sizes[Math.floor(Math.random() * sizes.length)];
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.top = Math.random() * 100 + '%';
      dot.style.opacity = (Math.random() * 0.08 + 0.04).toFixed(2);
      layer.appendChild(dot);
    }
  </script>
</body>
</html>
