<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caroline's Day Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="planner.css" />
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="panel sidebar">
      <h1>Daily<br><em>Planner</em></h1>
      <div class="date" id="todayLabel"></div>

      <div class="top-actions">
        <button id="clearTodayBtn">Clear today</button>
        <button id="loadTemplateBtn">Load work template</button>
      </div>

      <div class="ornament-sep"><span></span><i></i><span></span></div>

      <p class="palette-title">Categories</p>
      <div class="palette" id="palette"></div>

      <a href="index.html" class="back-link">← back to home</a>
    </aside>

    <!-- ── Main planner ── -->
    <main class="panel planner-shell">
      <div class="planner-header">
        <div>
          <h2>Today's timetable</h2>
          <p id="mobileHint">Drag a category in · tap a block to edit</p>
        </div>
        <span class="pill" id="saveHint">Auto-saved</span>
      </div>

      <div class="planner-body">
        <div class="time-col"  id="timeCol"></div>
        <div class="grid-wrap" id="gridWrap"></div>
      </div>
    </main>

    <!-- ── Desktop editor panel ── -->
    <aside class="panel editor" id="desktopEditor">
      <h3>Selected block</h3>
      <div class="editor-empty" id="editorEmpty">
        Click a block to edit its note, time, or category.
      </div>
      <div id="editorForm" hidden>
        <div class="field">
          <label for="editCategory">Category</label>
          <select id="editCategory"></select>
        </div>
        <div class="field">
          <label for="editNote">Note</label>
          <textarea id="editNote" placeholder="meeting with team, prep slides, call client…"></textarea>
        </div>
        <div class="mini-row">
          <div class="field">
            <label for="editStart">Start</label>
            <input id="editStart" type="time" />
          </div>
          <div class="field">
            <label for="editEnd">End</label>
            <input id="editEnd" type="time" />
          </div>
        </div>
        <div class="editor-actions">
          <button id="duplicateBtn">Duplicate</button>
          <button id="deleteBtn" class="danger">Delete</button>
        </div>
      </div>
      <div class="footer-note">
        Saves automatically in your browser.<br>
        "Load work template" adds a sample workday you can adjust.
      </div>
    </aside>
  </div>

  <!-- ── Mobile bottom-sheet editor ── -->
  <div class="editor-overlay" id="editorOverlay">
    <div class="editor-overlay-backdrop" id="overlayBackdrop"></div>
    <div class="editor-sheet" id="editorSheet">
      <div class="sheet-handle"></div>
      <h3>Edit block</h3>
      <div class="field">
        <label for="editCategoryM">Category</label>
        <select id="editCategoryM"></select>
      </div>
      <div class="field">
        <label for="editNoteM">Note</label>
        <textarea id="editNoteM" placeholder="meeting with team, prep slides…"></textarea>
      </div>
      <div class="mini-row">
        <div class="field">
          <label for="editStartM">Start</label>
          <input id="editStartM" type="time" />
        </div>
        <div class="field">
          <label for="editEndM">End</label>
          <input id="editEndM" type="time" />
        </div>
      </div>
      <div class="editor-actions">
        <button id="duplicateBtnM">Duplicate</button>
        <button id="deleteBtnM" class="danger">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const CATEGORY_CONFIG = {
      Meeting:     { color: getCssVar('--meeting')  },
      'Deep Work': { color: getCssVar('--focus')    },
      Admin:       { color: getCssVar('--admin')    },
      Errand:      { color: getCssVar('--errand')   },
      Break:       { color: getCssVar('--break')    },
      Meal:        { color: getCssVar('--meal')     },
      Personal:    { color: getCssVar('--personal') },
      Other:       { color: getCssVar('--other')    },
    };
    const CATEGORY_ICONS = {
      Meeting:'🤝','Deep Work':'🎯',Admin:'📋',
      Errand:'🚗',Break:'☕',Meal:'🍽',Personal:'🌿',Other:'✦',
    };

    const DAY_START    = 8  * 60;
    const DAY_END      = 21 * 60;
    const MIN_DURATION = 30;
    const SNAP_MINUTES = 15;
    const STORAGE_KEY  = 'caroline_day_planner_v1';
    const TEMPLATE_KEY = 'caroline_day_planner_template_v1';

    function getHourHeight() { return window.innerWidth < 700 ? 80 : 96; }
    function getPxPerMin()   { return getHourHeight() / 60; }

    const paletteEl       = document.getElementById('palette');
    const timeColEl       = document.getElementById('timeCol');
    const gridWrapEl      = document.getElementById('gridWrap');
    const todayLabelEl    = document.getElementById('todayLabel');
    const clearTodayBtn   = document.getElementById('clearTodayBtn');
    const loadTemplateBtn = document.getElementById('loadTemplateBtn');
    const saveHintEl      = document.getElementById('saveHint');
    const mobileHintEl    = document.getElementById('mobileHint');
    const editorEmptyEl   = document.getElementById('editorEmpty');
    const editorFormEl    = document.getElementById('editorForm');
    const editCategoryEl  = document.getElementById('editCategory');
    const editNoteEl      = document.getElementById('editNote');
    const editStartEl     = document.getElementById('editStart');
    const editEndEl       = document.getElementById('editEnd');
    const duplicateBtn    = document.getElementById('duplicateBtn');
    const deleteBtn       = document.getElementById('deleteBtn');
    const editorOverlay   = document.getElementById('editorOverlay');
    const overlayBackdrop = document.getElementById('overlayBackdrop');
    const editCategoryM   = document.getElementById('editCategoryM');
    const editNoteM       = document.getElementById('editNoteM');
    const editStartM      = document.getElementById('editStartM');
    const editEndM        = document.getElementById('editEndM');
    const duplicateBtnM   = document.getElementById('duplicateBtnM');
    const deleteBtnM      = document.getElementById('deleteBtnM');

    let events     = loadTodayEvents();
    let selectedId = null;
    let dragState  = null;

    init();

    function init() {
      renderTodayLabel();
      renderPalette();
      renderTimeColumn();
      renderHourLines();
      renderEditorCategoryOptions();
      renderEvents();
      updateEditor();
      attachGridDropEvents();
      attachDesktopEditorEvents();
      attachMobileEditorEvents();
      clearTodayBtn.addEventListener('click', clearToday);
      loadTemplateBtn.addEventListener('click', loadTemplateIntoToday);
      overlayBackdrop.addEventListener('click', closeMobileEditor);
      if (window.innerWidth < 700) {
        mobileHintEl.textContent = 'Tap a category to add · tap block to edit';
      }
      window.addEventListener('resize', () => { renderTimeColumn(); renderHourLines(); renderEvents(); });
    }

    function getCssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function renderTodayLabel() {
      todayLabelEl.textContent = new Date().toLocaleDateString('en-CA', {
        weekday:'long', month:'short', day:'numeric'
      });
    }

    function renderPalette() {
      paletteEl.innerHTML = '';
      Object.keys(CATEGORY_CONFIG).forEach(category => {
        const el = document.createElement('div');
        el.className = 'task-template';
        el.draggable = true;
        el.dataset.category = category;
        el.innerHTML = `<span class="task-dot" style="background:${CATEGORY_CONFIG[category].color}"></span>
          <span>${CATEGORY_ICONS[category]||''} ${category}</span>`;
        el.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ category }));
        });
        el.addEventListener('click', () => {
          if (window.innerWidth >= 700) return;
          const now = new Date();
          const nowMin = now.getHours()*60 + now.getMinutes();
          const startMinute = snapToStep(nowMin, SNAP_MINUTES, DAY_START, DAY_END - MIN_DURATION);
          const newEvent = {
            id: cryptoRandomId(), category, note: '',
            color: CATEGORY_CONFIG[category].color,
            startMinute, endMinute: startMinute + 60,
          };
          events.push(newEvent);
          selectedId = newEvent.id;
          persistAndRender();
          openMobileEditor();
        });
        paletteEl.appendChild(el);
      });
    }

    function renderTimeColumn() {
      const HH = getHourHeight();
      timeColEl.innerHTML = '';
      for (let h = DAY_START/60; h <= DAY_END/60; h++) {
        const slot = document.createElement('div');
        slot.className = 'time-slot';
        slot.style.height = HH + 'px';
        slot.textContent = formatHourLabel(h);
        timeColEl.appendChild(slot);
      }
    }

    function renderHourLines() {
      const HH = getHourHeight();
      gridWrapEl.querySelectorAll('.hour-line').forEach(el => el.remove());
      const totalH = (DAY_END - DAY_START) / 60;
      gridWrapEl.style.minHeight = (totalH * HH) + 'px';
      for (let i = 0; i <= totalH; i++) {
        const line = document.createElement('div');
        line.className = 'hour-line';
        line.style.top = (i * HH) + 'px';
        gridWrapEl.appendChild(line);
      }
    }

    function renderEditorCategoryOptions() {
      [editCategoryEl, editCategoryM].forEach(sel => {
        sel.innerHTML = '';
        Object.keys(CATEGORY_CONFIG).forEach(cat => {
          const o = document.createElement('option');
          o.value = cat;
          o.textContent = `${CATEGORY_ICONS[cat]||''} ${cat}`;
          sel.appendChild(o);
        });
      });
    }

    function renderEvents() {
      gridWrapEl.querySelectorAll('.event-block').forEach(el => el.remove());
      events.slice().sort((a,b) => a.startMinute - b.startMinute).forEach(event => {
        const block = document.createElement('div');
        block.className = 'event-block' + (event.id === selectedId ? ' selected' : '');
        block.dataset.id = event.id;
        block.style.top        = minuteToPixel(event.startMinute) + 'px';
        block.style.height     = Math.max(36, minuteToPixel(event.endMinute) - minuteToPixel(event.startMinute)) + 'px';
        block.style.background = event.color;
        block.innerHTML = `
          <div class="event-title">${CATEGORY_ICONS[event.category]||''} ${escapeHtml(event.category)}</div>
          <div class="event-note">${escapeHtml(event.note||'')}</div>
          <div class="event-time">${formatMinuteLabel(event.startMinute)} – ${formatMinuteLabel(event.endMinute)}</div>
          <div class="resize-handle"></div>`;
        block.addEventListener('mousedown', e => {
          if (e.target.classList.contains('resize-handle')) { startResize(e, event.id); return; }
          startMove(e, event.id);
        });
        block.addEventListener('touchstart', e => {
          if (e.target.classList.contains('resize-handle')) { startResizeTouch(e, event.id); return; }
          startMoveTouch(e, event.id);
        }, { passive: false });
        block.addEventListener('click', e => {
          e.stopPropagation();
          selectedId = event.id;
          renderEvents(); updateEditor();
          if (window.innerWidth < 700) openMobileEditor();
        });
        gridWrapEl.appendChild(block);
      });
      gridWrapEl.addEventListener('click', e => {
        if (e.target.closest('.event-block')) return;
        selectedId = null; renderEvents(); updateEditor();
      }, { once: true });
    }

    function attachGridDropEvents() {
      gridWrapEl.addEventListener('dragover', e => { e.preventDefault(); gridWrapEl.classList.add('drag-over'); });
      gridWrapEl.addEventListener('dragleave', () => gridWrapEl.classList.remove('drag-over'));
      gridWrapEl.addEventListener('drop', e => {
        e.preventDefault(); gridWrapEl.classList.remove('drag-over');
        const raw = e.dataTransfer.getData('text/plain'); if (!raw) return;
        let data; try { data = JSON.parse(raw); } catch { return; }
        const rect = gridWrapEl.getBoundingClientRect();
        const startMinute = snapToStep(pixelToMinute(e.clientY - rect.top), SNAP_MINUTES, DAY_START, DAY_END - MIN_DURATION);
        const newEvent = {
          id: cryptoRandomId(), category: data.category||'Other', note:'',
          color: CATEGORY_CONFIG[data.category]?.color || CATEGORY_CONFIG.Other.color,
          startMinute, endMinute: startMinute + 60,
        };
        events.push(newEvent); selectedId = newEvent.id; persistAndRender();
      });
    }

    function startMove(e, id) {
      e.preventDefault();
      const ev = events.find(i => i.id === id); if (!ev) return;
      selectedId = id; renderEvents(); updateEditor();
      dragState = { type:'move', id, startY:e.clientY, originalStart:ev.startMinute, originalEnd:ev.endMinute };
      document.addEventListener('mousemove', handleDrag);
      document.addEventListener('mouseup', stopDrag);
    }
    function startResize(e, id) {
      e.preventDefault(); e.stopPropagation();
      const ev = events.find(i => i.id === id); if (!ev) return;
      selectedId = id; renderEvents(); updateEditor();
      dragState = { type:'resize', id, startY:e.clientY, originalStart:ev.startMinute, originalEnd:ev.endMinute };
      document.addEventListener('mousemove', handleDrag);
      document.addEventListener('mouseup', stopDrag);
    }
    function handleDrag(e) {
      if (!dragState) return;
      const ev = events.find(i => i.id === dragState.id); if (!ev) return;
      applyDrag(ev, snapDeltaToStep(pixelToMinuteDelta(e.clientY - dragState.startY), SNAP_MINUTES));
      renderEvents(); updateEditor();
    }
    function stopDrag() {
      dragState = null;
      document.removeEventListener('mousemove', handleDrag);
      document.removeEventListener('mouseup', stopDrag);
      saveTodayEvents(); flashSaved();
    }

    function startMoveTouch(e, id) {
      if (e.touches.length > 1) return;
      e.preventDefault();
      const ev = events.find(i => i.id === id); if (!ev) return;
      selectedId = id; renderEvents(); updateEditor();
      dragState = { type:'move', id, startY:e.touches[0].clientY, originalStart:ev.startMinute, originalEnd:ev.endMinute };
      document.addEventListener('touchmove', handleTouchDrag, { passive:false });
      document.addEventListener('touchend', stopTouchDrag);
    }
    function startResizeTouch(e, id) {
      if (e.touches.length > 1) return;
      e.preventDefault(); e.stopPropagation();
      const ev = events.find(i => i.id === id); if (!ev) return;
      selectedId = id; renderEvents(); updateEditor();
      dragState = { type:'resize', id, startY:e.touches[0].clientY, originalStart:ev.startMinute, originalEnd:ev.endMinute };
      document.addEventListener('touchmove', handleTouchDrag, { passive:false });
      document.addEventListener('touchend', stopTouchDrag);
    }
    function handleTouchDrag(e) {
      if (!dragState || !e.touches.length) return;
      e.preventDefault();
      const ev = events.find(i => i.id === dragState.id); if (!ev) return;
      applyDrag(ev, snapDeltaToStep(pixelToMinuteDelta(e.touches[0].clientY - dragState.startY), SNAP_MINUTES));
      renderEvents(); updateEditor();
    }
    function stopTouchDrag() {
      dragState = null;
      document.removeEventListener('touchmove', handleTouchDrag);
      document.removeEventListener('touchend', stopTouchDrag);
      saveTodayEvents(); flashSaved();
      if (window.innerWidth < 700 && selectedId) openMobileEditor();
    }

    function applyDrag(ev, deltaMin) {
      if (dragState.type === 'move') {
        const dur = dragState.originalEnd - dragState.originalStart;
        const next = Math.min(clampMinute(dragState.originalStart + deltaMin), DAY_END - dur);
        ev.startMinute = next; ev.endMinute = next + dur;
      } else {
        ev.endMinute = Math.min(DAY_END, Math.max(dragState.originalStart + MIN_DURATION, dragState.originalEnd + deltaMin));
      }
    }

    function updateEditor() {
      const ev = getSelectedEvent();
      if (!ev) { editorEmptyEl.hidden = false; editorFormEl.hidden = true; return; }
      editorEmptyEl.hidden = true; editorFormEl.hidden = false;
      editCategoryEl.value = ev.category; editNoteEl.value = ev.note;
      editStartEl.value = minuteToTimeString(ev.startMinute);
      editEndEl.value   = minuteToTimeString(ev.endMinute);
    }

    function openMobileEditor() {
      const ev = getSelectedEvent(); if (!ev) return;
      editCategoryM.value = ev.category; editNoteM.value = ev.note;
      editStartM.value = minuteToTimeString(ev.startMinute);
      editEndM.value   = minuteToTimeString(ev.endMinute);
      editorOverlay.style.display = 'block';
      requestAnimationFrame(() => editorOverlay.classList.add('open'));
    }
    function closeMobileEditor() {
      editorOverlay.classList.remove('open');
      setTimeout(() => { editorOverlay.style.display = 'none'; }, 350);
    }

    function attachDesktopEditorEvents() {
      editCategoryEl.addEventListener('change', () => {
        const ev = getSelectedEvent(); if (!ev) return;
        ev.category = editCategoryEl.value; ev.color = CATEGORY_CONFIG[ev.category].color; persistAndRender();
      });
      editNoteEl.addEventListener('input', () => { const ev = getSelectedEvent(); if (!ev) return; ev.note = editNoteEl.value; persistAndRender(false); });
      editStartEl.addEventListener('change', () => applyTimeEdit('start', editStartEl.value));
      editEndEl.addEventListener('change',   () => applyTimeEdit('end',   editEndEl.value));
      duplicateBtn.addEventListener('click', duplicateSelected);
      deleteBtn.addEventListener('click', deleteSelected);
    }
    function attachMobileEditorEvents() {
      editCategoryM.addEventListener('change', () => {
        const ev = getSelectedEvent(); if (!ev) return;
        ev.category = editCategoryM.value; ev.color = CATEGORY_CONFIG[ev.category].color; persistAndRender();
      });
      editNoteM.addEventListener('input', () => { const ev = getSelectedEvent(); if (!ev) return; ev.note = editNoteM.value; persistAndRender(false); });
      editStartM.addEventListener('change', () => applyTimeEdit('start', editStartM.value));
      editEndM.addEventListener('change',   () => applyTimeEdit('end',   editEndM.value));
      duplicateBtnM.addEventListener('click', () => { duplicateSelected(); closeMobileEditor(); });
      deleteBtnM.addEventListener('click',    () => { deleteSelected();    closeMobileEditor(); });
    }

    function applyTimeEdit(which, value) {
      const ev = getSelectedEvent(); if (!ev) return;
      const min = timeStringToMinute(value); if (min == null) return;
      if (which === 'start') {
        const dur = ev.endMinute - ev.startMinute;
        ev.startMinute = clampMinute(min);
        ev.endMinute   = clampMinute(Math.max(ev.startMinute + MIN_DURATION, ev.startMinute + dur));
        if (ev.endMinute > DAY_END) { ev.endMinute = DAY_END; ev.startMinute = Math.max(DAY_START, DAY_END - dur); }
      } else {
        ev.endMinute = clampMinute(Math.max(ev.startMinute + MIN_DURATION, min));
      }
      persistAndRender();
    }

    function duplicateSelected() {
      const ev = getSelectedEvent(); if (!ev) return;
      const dur = ev.endMinute - ev.startMinute;
      const start = clampMinute(Math.min(DAY_END - dur, ev.startMinute + 30));
      events.push({ ...ev, id:cryptoRandomId(), startMinute:start, endMinute:start+dur });
      selectedId = events[events.length-1].id; persistAndRender();
    }
    function deleteSelected() {
      if (!selectedId) return;
      events = events.filter(ev => ev.id !== selectedId); selectedId = null; persistAndRender();
    }

    function persistAndRender(updateEditorPanel = true) {
      saveTodayEvents(); renderEvents();
      if (updateEditorPanel) updateEditor();
      flashSaved();
    }
    function flashSaved() {
      saveHintEl.textContent = 'Saved ✦';
      clearTimeout(flashSaved._t);
      flashSaved._t = setTimeout(() => { saveHintEl.textContent = 'Auto-saved'; }, 900);
    }
    function clearToday() {
      if (!confirm('Clear today\'s timetable?')) return;
      events = []; selectedId = null; persistAndRender();
    }
    function loadTemplateIntoToday() {
      events = loadTemplate().map(item => ({ ...item, id:cryptoRandomId() }));
      selectedId = null; persistAndRender();
    }
    function loadTodayEvents() {
      const store = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
      return Array.isArray(store[getTodayKey()]) ? store[getTodayKey()] : [];
    }
    function saveTodayEvents() {
      const store = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
      store[getTodayKey()] = events;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    }
    function loadTemplate() {
      const ex = JSON.parse(localStorage.getItem(TEMPLATE_KEY)||'null');
      if (Array.isArray(ex) && ex.length) return ex;
      const fb = [
        make('Deep Work','Morning focus block',  9*60,  11*60),
        make('Meeting',  'Team standup',         11*60, 11*60+30),
        make('Meal',     'Lunch',                12*60, 13*60),
        make('Deep Work','Afternoon work block', 13*60, 15*60),
        make('Admin',    'Emails & catch-up',    15*60, 16*60),
        make('Break',    'Coffee break',         16*60, 16*60+15),
        make('Meeting',  'End-of-day check-in',  17*60, 17*60+30),
      ];
      localStorage.setItem(TEMPLATE_KEY, JSON.stringify(fb));
      return fb;
    }
    function make(cat, note, s, e) {
      return { id:cryptoRandomId(), category:cat, note, color:CATEGORY_CONFIG[cat].color, startMinute:s, endMinute:e };
    }

    function getSelectedEvent()  { return events.find(ev => ev.id === selectedId)||null; }
    function getTodayKey()       { return new Date().toISOString().slice(0,10); }
    function minuteToPixel(m)    { return (m - DAY_START) * getPxPerMin(); }
    function pixelToMinute(px)   { return DAY_START + px / getPxPerMin(); }
    function pixelToMinuteDelta(px) { return px / getPxPerMin(); }
    function snapToStep(v,step,min,max) { return Math.min(max,Math.max(min,Math.round(v/step)*step)); }
    function snapDeltaToStep(v,step)    { return Math.round(v/step)*step; }
    function clampMinute(m) { return Math.max(DAY_START,Math.min(DAY_END,m)); }
    function formatHourLabel(h24) { return `${h24%12===0?12:h24%12}:00 ${h24>=12?'PM':'AM'}`; }
    function formatMinuteLabel(m) {
      const h24=Math.floor(m/60), min=m%60;
      return `${h24%12===0?12:h24%12}:${String(min).padStart(2,'0')} ${h24>=12?'PM':'AM'}`;
    }
    function minuteToTimeString(m) {
      return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    }
    function timeStringToMinute(str) {
      if (!str||!str.includes(':')) return null;
      const [h,m] = str.split(':').map(Number);
      return (isNaN(h)||isNaN(m)) ? null : h*60+m;
    }
    function cryptoRandomId() { return 'ev-'+Math.random().toString(36).slice(2,10); }
    function escapeHtml(str) {
      return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
    }
  </script>
</body>
</html>
